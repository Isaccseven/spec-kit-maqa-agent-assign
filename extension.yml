schema_version: "1.0"

extension:
  id: maqa-agent-assign
  name: MAQA + Agent Assign Bridge
  version: 1.1.0
  description: "Kombiniert speckit.maqa und speckit.agent-assign – installiert Abhaengigkeiten automatisch."
  author: Isaccseven
  repository: https://github.com/Isaccseven/spec-kit-maqa-agent-assign
  license: MIT

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: speckit.maqa-aa.install-deps
      file: commands/install-deps.md
      description: "Prueft und installiert speckit.maqa + speckit.agent-assign automatisch"

    - name: speckit.maqa-aa.coordinator
      file: commands/coordinator.md
      description: "MAQA Coordinator mit automatischem Agent-Assign"

    - name: speckit.maqa-aa.scaffold-agents
      file: commands/scaffold-agents.md
      description: "Generiert Agent-Files basierend auf dem Projekt-Stack"

    - name: speckit.maqa-aa.status
      file: commands/status.md
      description: "Unified Status Dashboard fuer MAQA + Agent-Assign"

# Der before_specify Hook laueft einmalig beim ersten Projektstart.
# priority: 1 stellt sicher, dass er vor allen anderen Hooks ausgefuehrt wird.
hooks:
  before_specify:
    command: speckit.maqa-aa.install-deps
    priority: 1
    optional: true
    prompt: "MAQA + Agent-Assign Dependencies pruefen/installieren?"
    description: "Stellt sicher dass speckit.maqa und speckit.agent-assign installiert sind"
    condition: null

  after_tasks:
    command: speckit.maqa-aa.coordinator
    priority: 10
    optional: false
    description: "Automatisches Agent-Assign nach Task-Generierung"

tags:
  - maqa
  - agent-assign
  - automation
  - coordinator

defaults:
  auto_install_deps: true
  fallback_to_implement: true
