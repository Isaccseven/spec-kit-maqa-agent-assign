schema_version: "1.0"

extension:
  id: maqa-agent-assign
  name: MAQA + Agent Assign Bridge
  version: 1.1.0
  description: "Bridges speckit.maqa and speckit.agent-assign — installs dependencies automatically."
  author: Isaccseven
  repository: https://github.com/Isaccseven/spec-kit-maqa-agent-assign
  license: MIT

requires:
  speckit_version: ">=0.1.0"

provides:
  commands:
    - name: speckit.maqa-aa.install-deps
      file: commands/install-deps.md
      description: "Checks and installs speckit.maqa + speckit.agent-assign automatically"

    - name: speckit.maqa-aa.coordinator
      file: commands/coordinator.md
      description: "MAQA Coordinator with automatic Agent-Assign"

    - name: speckit.maqa-aa.scaffold-agents
      file: commands/scaffold-agents.md
      description: "Detects the project stack and generates matching Agent-Files"

    - name: speckit.maqa-aa.status
      file: commands/status.md
      description: "Unified Status Dashboard for MAQA + Agent-Assign"

# The before_specify hook runs once on the first project start.
# priority: 1 ensures it runs before all other hooks.
hooks:
  before_specify:
    command: speckit.maqa-aa.install-deps
    priority: 1
    optional: true
    prompt: "Check and install MAQA + Agent-Assign dependencies?"
    description: "Ensures that speckit.maqa and speckit.agent-assign are installed"
    condition: null

  after_tasks:
    command: speckit.maqa-aa.coordinator
    priority: 10
    optional: false
    description: "Automatic Agent-Assign after task generation"

tags:
  - maqa
  - agent-assign
  - automation
  - coordinator

defaults:
  auto_install_deps: true
  fallback_to_implement: true
